services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: box
      POSTGRES_PASSWORD: box
      POSTGRES_DB: box
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U box -d box"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
